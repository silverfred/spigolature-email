name: Email schedule trigger

on:
  schedule:
    # GitHub usa UTC.
    # Questi tentativi coprono sia ora solare sia ora legale italiana.
    # Lo script Python poi invia solo se in Italia sono le 05 o le 18.
    - cron: "5,35 3,4,16,17 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger-email:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Random chapter email workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/dispatches" \
            -f event_type=scheduled-email
