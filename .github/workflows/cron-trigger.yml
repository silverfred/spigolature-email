name: Cron Schedule Trigger

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger-email:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger daily email workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'scheduled-email'
            })

            core.info('repository_dispatch scheduled-email inviato correttamente')
