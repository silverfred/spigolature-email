name: Daily random chapter email

on:
  schedule:
    # 17:45 UTC = 19:45 in Italia con ora legale
    - cron: "45 17 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send random chapter
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}

          DOCX_PATH: "spigolature.docx"
          HISTORY_PATH: "cronologia.txt"
          EXPECTED_CHAPTER_COUNT: "166"

          # Lo metto su false per il test:
          # così, anche se GitHub ritarda di qualche minuto, la mail parte comunque.
          ENFORCE_LOCAL_HOURS: "false"
          LOCAL_TZ: "Europe/Rome"
          ALLOWED_LOCAL_HOURS: "19"
        run: python send_random_chapter.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f cronologia.txt ]; then
            git add cronologia.txt
            git diff --cached --quiet || git commit -m "Update sent chapter history"
            git push
          else
            echo "Nessun file cronologia.txt da salvare."
          fi
