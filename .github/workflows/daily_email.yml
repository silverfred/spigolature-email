name: Random chapter email

on:
  workflow_dispatch:
  repository_dispatch:
    types: [scheduled-email]

permissions:
  contents: write

concurrency:
  group: spigolature-email
  cancel-in-progress: false

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show current time
        run: |
          echo "UTC time:"
          date -u
          echo "Runner time:"
          date

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send random chapter
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}

          DOCX_PATH: "spigolature.docx"
          HISTORY_PATH: "cronologia.txt"
          SEND_LOG_PATH: "invii_email.txt"
          EXPECTED_CHAPTER_COUNT: "166"

          ENFORCE_LOCAL_HOURS: "true"
          LOCAL_TZ: "Europe/Rome"
          ALLOWED_LOCAL_HOURS: "5,18"
          MANUAL_SEND_IGNORES_WINDOWS: "true"
        run: python send_random_chapter.py

      - name: Commit updated logs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add cronologia.txt

          if [ -f invii_email.txt ]; then
            git add invii_email.txt
          fi

          if git diff --cached --quiet; then
            echo "Nessuna cronologia da aggiornare."
          else
            git commit -m "Update email history"
            git push
          fi
